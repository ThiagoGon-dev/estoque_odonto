<!DOCTYPE html>
<html>
<head>
    <title>Editar Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container mt-5">

    <div class="card shadow-lg">
        <div class="card-header bg-warning text-dark">
            <h4>Editar Item</h4>
        </div>

        <div class="card-body">

            <form method="post">

                <input type="hidden" name="id" value="{{item[0]}}">

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Código</label>
                        <input name="codigo" class="form-control" value="{{item[1]}}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Nome</label>
                        <input name="nome" class="form-control" value="{{item[2]}}">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label>Quantidade</label>
                        <input name="quantidade" type="number" class="form-control" value="{{item[3]}}">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Estoque mínimo</label>
                        <input name="minimo" type="number" class="form-control" value="{{item[4]}}">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Quantidade compra</label>
                        <input name="compra" type="number" class="form-control" value="{{item[5]}}">
                    </div>
                </div>

                <button class="btn btn-success">Salvar</button>
                <a href="/dashboard" class="btn btn-secondary">Voltar</a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
